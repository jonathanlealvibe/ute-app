<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UTE Registro</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="theme-color" content="#0A1128">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UTE Registro">
<style>
  html,body{margin:0;padding:0;height:100%;background:#0A1128;overflow:hidden}
  #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;z-index:2;transition:opacity .4s}
  #splash img{width:130px;height:130px}
  #splash p{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#0A1128;font-weight:600;margin-top:14px}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0}
</style>
</head>
<body>
<div id="splash"><img src="icon-512.png" alt="UTE"><p>UTE Registro</p></div>
<iframe id="app" src="https://conciergeai.space/carreras-quito"
        allow="microphone; camera; autoplay; clipboard-write; geolocation"
        title="UTE Registro"></iframe>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  const f = document.getElementById('app');
  const hide = () => { const s=document.getElementById('splash'); s.style.opacity=0; setTimeout(()=>s.remove(), 450); };
  f.addEventListener('load', () => setTimeout(hide, 600));
  setTimeout(hide, 7000);
</script>
</body>
</html>
